[workspace]
name = "contextplusplus"
version = "0.1.0"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64"]

[tasks.build-cli]
cmd = "cd cli && go build -o ../build/context++-ui ./cmd/contextplusplus-ui"

[tasks.test-cli]
cmd = "cd cli && go test ./..."

[dependencies]
go = "1.24.*"
